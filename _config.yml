title: Formación obligatoria para empresas en España
description: >-
  Legislación, reglamentos y obligaciones de formación que toda empresa española
  debe cumplir. Cada norma comentada para técnicos de RRHH, compliance y formación.

url: https://ciberaula.github.io
baseurl: /formacion-obligatoria-empresas-espana

remote_theme: just-the-docs/just-the-docs@v0.7.0

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s\-/]+/
  rel_url: true
  button: false

enable_copy_code_button: true
nav_sort: case_insensitive
heading_anchors: true
color_scheme: light

aux_links:
  "CiberAula.com":
    - "https://www.ciberaula.com"
  "Ver en GitHub":
    - "https://github.com/Ciberaula/formacion-obligatoria-empresas-espana"
aux_links_new_tab: true

footer_content: 'Mantenido por <a href="https://www.ciberaula.com">CiberAula</a> · Contenido bajo <a href="https://creativecommons.org/licenses/by-sa/4.0/">CC BY-SA 4.0</a> · Desde 1997.'

exclude:
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - .github/
